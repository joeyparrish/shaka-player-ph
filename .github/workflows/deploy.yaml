# Update metrics and deploy to GitHub Pages
name: Update and deploy

on:
  # Runs on pushes to main
  push:
    branches: ["main"]

  # Runs every morning at 7am PST / 3pm UTC
  schedule:
    - cron: "0 15 * * *"

  # Can be runs manually, too
  workflow_dispatch:


# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write


# Allow only one concurrent deployment.  However, do NOT cancel in-progress
# runs.  Let deployments complete.
concurrency:
  group: pages
  cancel-in-progress: false


jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build freeboard
        run: |
          cd freeboard
          npm install
          npm run build

      - name: Install Python requirements
        run: pip install -r ph/requirements.txt

      # We use separate restore and save steps (instead of the combined
      # actions/cache) so that the cache is saved even if the metrics step
      # fails.  The exact key includes run_id so each run writes a new cache
      # entry -- actions/cache skips the save if the exact key already exists,
      # so a stable key would only ever be written once.  The restore-keys
      # prefix picks up the most recent prior entry on restore.  GitHub evicts
      # entries not accessed in 7 days, so stale entries don't accumulate.
      - name: Restore PH cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/shaka-player-ph
          key: ph-cache-${{ github.run_id }}
          restore-keys: ph-cache-

      - name: Update metrics
        run: ./ph/update-all.sh
        env:
          GH_TOKEN: ${{ secrets.PH_GITHUB_TOKEN }}

      - name: Save PH cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/shaka-player-ph
          key: ph-cache-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
